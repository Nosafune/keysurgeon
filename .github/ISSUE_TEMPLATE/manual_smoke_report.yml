name: Manual smoke report
description: Submit real Windows keyboard smoke evidence for release gating.
title: "[smoke]: "
labels: ["hardware-smoke"]
body:
  - type: dropdown
    id: result
    attributes:
      label: Result
      description: Use the exact result that should be recorded by scripts/record-manual-smoke-result.ps1.
      options:
        - hardware-smoke-pass
        - hardware-smoke-partial
        - hardware-smoke-fail
        - not-run
    validations:
      required: true
  - type: input
    id: tester
    attributes:
      label: Tester
      description: Name or handle to record in the smoke result.
      placeholder: "Example: tester-handle"
    validations:
      required: true
  - type: input
    id: keyboard
    attributes:
      label: Keyboard tested
      description: Brand/model and whether it is laptop, membrane, hot-swap, or soldered if known.
      placeholder: "Example: Razer BlackWidow V4 Pro, external mechanical"
    validations:
      required: true
  - type: input
    id: install_source
    attributes:
      label: Install source
      description: How this build was installed before the smoke run.
      placeholder: "Example: local checkout, pip install ., release exe"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KeySurgeon version
      placeholder: "Run: keysurgeon --version"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Example: Windows 11 24H2"
    validations:
      required: true
  - type: textarea
    id: evidence_report
    attributes:
      label: Evidence report
      description: Paste the completed docs/MANUAL_SMOKE_REPORT.md content or link to the committed report. Include keysurgeon proof --json and any relevant keysurgeon export --json output.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: For partial or failed smoke runs, name the exact missing or failed check.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not paste typed private text; this report contains only key labels, timing evidence, verdicts, environment facts, and keyboard model details.
          required: true

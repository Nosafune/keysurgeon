name: selftest

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify public tree
        shell: pwsh
        run: .\scripts\verify-public-tree.ps1
      - name: Verify landing render
        shell: pwsh
        run: .\scripts\verify-site-render.ps1
      - name: Install package
        run: python -m pip install .
      - name: Verify installed command
        shell: pwsh
        run: |
          python -c "import rich_ui, app_textual; print('TEXTUAL_FACTORY_OK', app_textual.build_app() is not None)"
          keysurgeon --version
          keysurgeon --plain doctor
          keysurgeon export --json
          keysurgeon proof --json
      - name: Clean generated artifacts
        if: always()
        shell: pwsh
        run: .\scripts\clean-artifacts.ps1

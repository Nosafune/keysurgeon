name: pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify static site
        run: |
          test -f site/index.html
          test -f site/assets/keysurgeon.css
          test -f site/assets/keysurgeon-mark.svg
          test -f site/assets/keysurgeon-flow.svg
          test -f site/assets/keysurgeon-proof.json
          test -f site/assets/keysurgeon-social.png
      - name: Verify landing copy
        run: python -c "from html.parser import HTMLParser; from pathlib import Path; html=Path('site/index.html').read_text(encoding='utf-8'); HTMLParser().feed(html); required=('See install steps','Windows','MIT','local JSON','Rich + Textual','See the signal','--plain fallback','Sample diagnosis copy','keysurgeon proof --json','assets/keysurgeon-flow.svg','python -m pip install .'); missing=[x for x in required if x not in html]; assert not missing, missing"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

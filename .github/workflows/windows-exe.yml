name: windows-exe

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: read
  actions: read

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Package release asset
        shell: pwsh
        run: .\scripts\package-release-asset.ps1
      - name: Smoke packaged executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem .\dist\release\keysurgeon-v*-windows-x64.exe | Select-Object -First 1
          & $exe.FullName --version
          & $exe.FullName --plain doctor
          & $exe.FullName export --json
          & $exe.FullName proof --json
          & $exe.FullName selftest
          if (-not (Test-Path .\dist\release\SHA256SUMS.txt)) { throw "Missing SHA256SUMS.txt" }
          if (-not (Test-Path .\dist\release\release-manifest.json)) { throw "Missing release-manifest.json" }
      - uses: actions/upload-artifact@v4
        with:
          name: keysurgeon-windows-release-asset
          path: dist/release/*
